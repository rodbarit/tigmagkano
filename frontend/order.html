<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1C4587">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="tig-magkano">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>tig-magkano — Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --blue-dark: #1C4587;
    --blue-hdr:  #1155CC;
    --amber:     #B45F06;
    --tan:       #FFF2CC;
    --subtotal:  #C9DAF8;
    --bg:        #f0f4fa;
    --card:      #ffffff;
    --border:    #dde5f0;
    --text:      #1a1a2e;
    --muted:     #5a6a80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--blue-dark); color: #fff;
    padding: 0.9rem 2rem; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 12px rgba(28,69,135,0.2);
  }
  .logo-box {
    width: 36px; height: 36px; background: rgba(255,255,255,0.15);
    border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }

  main { max-width: 680px; margin: 2rem auto; padding: 0 1.25rem 4rem; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.5rem; margin-bottom: 1.25rem;
  }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
  .step-label {
    font-size: 11px; font-weight: 600; color: #8899b5;
    text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
  }
  .step-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--blue-dark); color: #fff;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .name-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .name-row input {
    flex: 1; font-size: 14px; font-family: inherit;
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px;
    background: #fff; color: var(--text); transition: border-color 0.15s;
  }
  .name-row input:focus { outline: none; border-color: var(--blue-dark); }
  .name-row button {
    padding: 8px 18px; font-size: 13px; font-weight: 600; font-family: inherit;
    background: var(--blue-dark); color: #fff; border: none; border-radius: 10px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .name-row button:hover { opacity: 0.85; }

  .participants { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.75rem; }
  .participant-badge {
    font-size: 12px; padding: 4px 12px; border-radius: 20px;
    background: #e8eef8; color: var(--blue-dark); font-weight: 500;
    border: 1px solid #c5d3e8;
  }
  .participant-badge.me { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }

  .items-list { display: flex; flex-direction: column; gap: 10px; }
  .item-info { flex: 1; }
  .item-name { font-size: 14px; font-weight: 500; }
  .item-cost { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .item-qty { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); background: #fff;
    font-size: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; color: var(--blue-dark);
    transition: background 0.1s;
  }
  .qty-btn:hover:not(:disabled) { background: #e8eef8; }
  .qty-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .qty-num { font-size: 15px; font-weight: 600; min-width: 24px; text-align: center; }

  .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .summary-table th { text-align: left; padding: 6px 8px; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border); }
  .summary-table td { padding: 8px; border-bottom: 0.5px solid #eef1f6; }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table .r { text-align: right; }
  .summary-table .total-row td { font-weight: 600; padding-top: 12px; }

  .summary-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .dl-btn {
    width: 100%; padding: 0.8rem; font-size: 15px; font-weight: 600; font-family: inherit;
    background: var(--blue-dark); color: #fff; border: none; border-radius: 10px;
    cursor: pointer; transition: opacity 0.15s; margin-top: 0.75rem;
  }
  .dl-btn:hover { opacity: 0.88; }

  .status { font-size: 13px; color: var(--muted); text-align: center; margin-top: 0.6rem; min-height: 18px; }
  .status.ok { color: #1D9E75; }
  .status.error { color: #c0392b; }

  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .empty-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }

  .item-row { padding: 10px 14px; background: #f7f9fc; border-radius: 10px; border: 1px solid var(--border); transition: border-color 0.15s, background 0.15s; }
  .item-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .split-btn { font-size: 11px; font-weight: 600; color: #B45F06; background: #fff8ee; border: 1px solid #f0d090; border-radius: 6px; padding: 4px 10px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .split-btn:hover { background: #fff0d0; }
  .split-row { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e0e8f0; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  .apply-btn { font-size: 11px; font-weight: 600; background: #1C4587; color: #fff; border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; }
  .apply-btn:hover { opacity: 0.85; }
  .split-tag { font-size: 11px; background: #fff8ee; color: #B45F06; border: 1px solid #f0d090; border-radius: 6px; padding: 2px 8px; font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo-box">🧾</div>
  <div><h1>tig-magkano</h1></div>
</header>

<main>
  <!-- Loading -->
  <div id="loadingState" class="card" style="text-align:center;padding:3rem">
    <div style="font-size:14px;color:var(--muted)">Loading order...</div>
  </div>

  <!-- Error -->
  <div id="errorState" class="card hidden" style="text-align:center;padding:3rem">
    <div style="font-size:32px;margin-bottom:1rem">😕</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:0.5rem">Order not found</div>
    <div style="font-size:13px;color:var(--muted)">This link may be invalid or expired.</div>
  </div>

  <!-- Main content -->
  <div id="mainContent" class="hidden fade-in">

    <!-- Context banner -->
    <div style="background:#e8f4ff;border:1px solid #b8d4f0;border-radius:12px;padding:0.85rem 1.1rem;margin-bottom:1.1rem;font-size:13px;color:#1C4587;line-height:1.6">
      📋 <strong>You've been invited to split a receipt.</strong> Enter your name below, then tap the items you ordered.
    </div>

    <!-- Step 1: Enter name -->
    <div class="card" id="nameStep">
      <div class="step-label"><span class="step-num">1</span> Who are you?</div>
      <div class="name-row">
        <input type="text" id="nameInput" placeholder="Enter your name" onkeydown="if(event.key==='Enter')setName()">
        <button onclick="setName()">Continue</button>
      </div>
      <div class="participants" id="participantsList"></div>
    </div>

    <!-- Step 2: Enter quantities -->
    <div class="card hidden" id="orderStep">
      <div class="step-label"><span class="step-num">2</span> What did you order? <span id="orderingAs" style="font-size:12px;color:#1C4587;font-weight:600;margin-left:4px"></span></div>
      <div class="items-list" id="itemsList"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:0.75rem">
        <div class="status" id="submitStatus" style="margin:0;flex:1"></div>
        <button onclick="clearMyOrder()" style="font-size:12px;color:#c0392b;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:8px 12px;min-height:44px;white-space:nowrap">Clear all</button>
      </div>
    </div>

    <!-- Step 3: Summary -->
    <div class="card hidden fade-in" id="summaryStep">
      <div class="step-label">Order summary</div>
      <div id="summaryContent"></div>

      <button onclick="shareLink()" style="width:100%;padding:0.8rem;font-size:15px;font-weight:600;font-family:inherit;background:#1D9E75;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:1rem;transition:opacity 0.15s" onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'">Share this link with friends</button>
      <div id="shareStatus" class="status" style="margin-top:0.5rem"></div>

    </div>

  </div>
</main>

<script>
  const ORDERS_URL = 'https://zxflznjmv7.execute-api.ap-southeast-1.amazonaws.com/prod/order';

  let orderId = null;
  let order = null;
  let myName = null;
  let myQtys = [];
  let saveTimer = null;
  let pollTimer = null;
  let isSaving = false;
  let isDirty = false;

  // ── INIT ───────────────────────────────────────────────────────────────────
  window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    orderId = params.get('id');
    if (!orderId) { showError(); return; }
    await loadOrder();
  };

  async function loadOrder() {
    try {
      const res = await fetch(`${ORDERS_URL}/${orderId}`);
      if (!res.ok) { showError(); return; }
      order = await res.json();
      myQtys = order.items.map(() => 0);
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      renderParticipants();
    } catch {
      showError();
    }
  }

  function showError() {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('errorState').classList.remove('hidden');
  }

  // ── NAME STEP ──────────────────────────────────────────────────────────────
  function setName() {
    const input = document.getElementById('nameInput');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    myName = name;
    document.getElementById('orderingAs').textContent = `— ordering as ${myName}`;

    // Show confirmed state with Change link
    const nameStep = document.getElementById('nameStep');
    const nameRow = nameStep.querySelector('.name-row');
    nameRow.innerHTML = `
      <span class="participant-badge me" style="font-size:14px;padding:8px 16px">${myName}</span>
      <button onclick="editName()" style="font-size:13px;color:var(--blue-dark);background:none;border:none;cursor:pointer;font-weight:600;font-family:inherit;padding:8px 12px;min-height:44px">Change</button>
    `;

    document.getElementById('orderStep').classList.remove('hidden');
    renderItems();
    renderSummary();
    document.getElementById('summaryStep').classList.remove('hidden');
    startPolling();
  }

  function editName() {
    const nameStep = document.getElementById('nameStep');
    const nameRow = nameStep.querySelector('.name-row');
    nameRow.innerHTML = `
      <input type="text" id="nameInput" placeholder="Enter your name" value="${myName}" onkeydown="if(event.key==='Enter')setName()">
      <button onclick="setName()">Update</button>
    `;
    document.getElementById('nameInput').focus();
  }

  function renderParticipants() {
    const list = document.getElementById('participantsList');
    list.innerHTML = '';
    if (!order.names || !order.names.length) {
      list.innerHTML = '<div style="font-size:12px;color:#aab5c8;margin-top:4px">No one has submitted yet — be the first!</div>';
      return;
    }
    order.names.forEach(n => {
      const badge = document.createElement('span');
      badge.className = 'participant-badge' + (n === myName ? ' me' : '');
      badge.textContent = n === myName ? `${n} (you)` : n;
      list.appendChild(badge);
    });
  }

  // ── ORDER STEP ─────────────────────────────────────────────────────────────
  function getDiscountItems() {
    // discount items are stored in order.items with isDiscount flag
    // return them directly so indexOf works correctly
    const fromItems = order.items.filter(it => it.isDiscount);
    if (fromItems.length > 0) return fromItems;
    // fallback for older orders without isDiscount flag - match by name
    const names = ['VAT Adjustment', 'SC Discount', 'PWD Discount'];
    const fromNames = order.items.filter(it => names.includes(it.name));
    if (fromNames.length > 0) return fromNames;
    // last resort: build from order fields
    const discounts = [];
    const vat = order.vat_adjustment;
    const scd = order.sc_discount;
    const pwd = order.pwd_discount;
    if (vat != null) discounts.push({ name: 'VAT Adjustment', unit_cost: vat, qty: 1, isDiscount: true });
    if (scd != null) discounts.push({ name: 'SC Discount', unit_cost: scd, qty: 1, isDiscount: true });
    if (pwd != null) discounts.push({ name: 'PWD Discount', unit_cost: pwd, qty: 1, isDiscount: true });
    return discounts;
  }

  function renderItems() {
    const list = document.getElementById('itemsList');
    list.innerHTML = '';

    // Add divider before discounts
    const allItems = [...order.items];
    const discountItems = getDiscountItems();
    const discountStartIdx = allItems.length;

    // Render food items only (exclude discount items - they show in Discounts section)
    order.items.filter(it => !it.isDiscount).forEach((item) => {
      const i = order.items.indexOf(item);
      const isShared = item.name.toLowerCase().includes('service');
      const serverVal = isShared ? (parseFloat(item.assignments?.[myName]) || 0) : (myName && item.assignments && item.assignments[myName] ? item.assignments[myName] : 0);
      if (!isDirty) myQtys[i] = serverVal;
      const existing = myQtys[i] || 0;
      const remaining = getRemaining(item);
      const isTaken = remaining <= 0 && existing <= 0;
      const div = document.createElement('div');
      div.className = 'item-row';
      div.id = `item-row-${i}`;
      if (item.name.toLowerCase().includes('service')) { div.style.borderColor = '#85B7EB'; div.style.background = '#E6F1FB'; }
      if (isTaken) { div.style.opacity = '0.5'; }
      div.innerHTML = `
        <div class="item-top">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-cost" style="color:${isShared ? '#185FA5' : 'var(--muted)'}">${isShared ? `₱${parseFloat(item.unit_cost).toFixed(2)} total · auto pro-rated` : `₱${parseFloat(item.unit_cost).toFixed(2)} each · ${item.qty} ordered`}</div>
          </div>
          ${isShared
            ? `<div style="text-align:right">
              <div class="qty-num" id="qty-${i}" style="color:#1D9E75;font-size:14px">${existing}</div>
              <span class="split-tag" id="split-tag-${i}" style="color:#185FA5;border-color:#85B7EB;background:#E6F1FB">${existing > 0 ? (existing * 100).toFixed(1) + '% pro-rated' : 'Auto pro-rated'}</span>
            </div>`
            : isTaken
            ? `<div style="text-align:right;max-width:140px">
              <div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.5px">Taken by</div>
              <div style="font-size:11px;color:#666;margin-top:2px">${Object.entries(item.assignments || {}).filter(([,v]) => (parseFloat(v)||0) > 0).map(([n,v]) => { const q = parseFloat(v); return q === 1 ? n : n + ' (' + q + ')'; }).join(', ')}</div>
            </div>`
            : `<div class="item-qty">
            <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
            <div class="qty-num" id="qty-${i}">${existing}</div>
            <button class="qty-btn" onclick="changeQty(${i}, 1)" ${existing >= remaining ? 'disabled' : ''}>+</button>
          </div>
          <button class="split-btn" id="split-btn-${i}" onclick="toggleSplit(${i})">Split</button>`
          }
        </div>
        ${isShared ? '' : `<div class="split-row hidden" id="split-row-${i}">
          <span>Split</span>
          <input type="number" id="split-orders-${i}" min="1" max="${item.qty}" value="1" style="width:44px;font-size:13px;font-weight:600;padding:4px 6px;border:1px solid #dde5f0;border-radius:6px;text-align:center;color:#1a1a2e">
          <span>order(s) between</span>
          <input type="number" id="split-people-${i}" min="1" value="2" style="width:44px;font-size:13px;font-weight:600;padding:4px 6px;border:1px solid #dde5f0;border-radius:6px;text-align:center;color:#1a1a2e">
          <span>people</span>
          <button class="apply-btn" onclick="applySplit(${i})">Apply</button>
          <span class="split-tag hidden" id="split-tag-${i}"></span>
        </div>`}
      `;
      list.appendChild(div);
    });

    // Render discount items if any
    if (discountItems.length > 0) {
      const divider = document.createElement('div');
      divider.style.cssText = 'font-size:10px;font-weight:700;color:#8899b5;text-transform:uppercase;letter-spacing:0.9px;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #eef1f6';
      divider.textContent = 'Discounts';
      list.appendChild(divider);

      discountItems.forEach((item) => {
        const i = order.items.indexOf(item);
        if (!isDirty && (myQtys[i] === undefined || myQtys[i] === 0)) myQtys[i] = getPrefill(item);
        const existing = myQtys[i] || 0;
        const div = document.createElement('div');
        div.className = 'item-row';
        div.id = 'item-row-' + i;
        div.style.background = '#f0f7f4';
        div.style.borderColor = '#b8e0d0';
        div.innerHTML = `
          <div class="item-top">
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-cost" style="color:#1D9E75">${parseFloat(item.unit_cost).toFixed(2)} total</div>
            </div>
            <div class="item-qty">
              <button class="qty-btn" onclick="changeQty(${i}, -1)" style="color:#1D9E75;border-color:#b8e0d0">-</button>
              <div class="qty-num" id="qty-${i}">${existing}</div>
              <button class="qty-btn" onclick="changeQty(${i}, 1)" style="color:#1D9E75;border-color:#b8e0d0">+</button>
            </div>
            <button class="split-btn" id="split-btn-${i}" onclick="toggleSplit(${i})" style="color:#1D9E75;border-color:#1D9E75">Split</button>
          </div>
          <div class="split-row hidden" id="split-row-${i}">
            <span>Split</span>
            <input type="number" id="split-orders-${i}" min="1" max="1" value="1" style="width:44px;font-size:13px;font-weight:600;padding:4px 6px;border:1px solid #dde5f0;border-radius:6px;text-align:center;color:#1a1a2e">
            <span>order(s) between</span>
            <input type="number" id="split-people-${i}" min="1" value="2" style="width:44px;font-size:13px;font-weight:600;padding:4px 6px;border:1px solid #dde5f0;border-radius:6px;text-align:center;color:#1a1a2e">
            <span>people</span>
            <button class="apply-btn" onclick="applySplit(${i})" style="background:#1D9E75">Apply</button>
            <span class="split-tag hidden" id="split-tag-${i}" style="background:#1D9E75"></span>
          </div>
        `;
        list.appendChild(div);
      });
    }
  }

  function toggleSplit(i) {
    const row = document.getElementById(`split-row-${i}`);
    const btn = document.getElementById(`split-btn-${i}`);
    const itemRow = document.getElementById(`item-row-${i}`);
    const isOpen = !row.classList.contains('hidden');
    if (isOpen) {
      row.classList.add('hidden');
      itemRow.style.borderColor = '';
      itemRow.style.background = '';
      btn.style.background = '';
    } else {
      row.classList.remove('hidden');
      itemRow.style.borderColor = '#f0d090';
      itemRow.style.background = '#fffdf5';
      btn.style.background = '#fff0d0';
      document.getElementById(`split-orders-${i}`).focus();
    }
  }

  function applySplit(i) {
    const maxOrders = parseFloat(order.items[i]?.qty || 1);
    const ordersInput = document.getElementById(`split-orders-${i}`);
    let orders = parseFloat(ordersInput?.value) || 1;
    if (orders > maxOrders) {
      orders = maxOrders;
      if (ordersInput) ordersInput.value = maxOrders;
    }
    const people = parseFloat(document.getElementById(`split-people-${i}`)?.value) || 1;
    const val = Math.round((orders / people) * 1000) / 1000;
    myQtys[i] = val;
    document.getElementById(`qty-${i}`).textContent = val;
    document.getElementById(`qty-${i}`).style.color = '#E67E22';
    const tag = document.getElementById(`split-tag-${i}`);
    tag.textContent = `${orders} ÷ ${people} = ${val} each`;
    tag.classList.remove('hidden');
    scheduleAutoSave();
  }

  function updateServiceChargeLive() {
    const scIdx = order.items.findIndex(it => !it.isDiscount && it.name.toLowerCase().includes('service'));
    if (scIdx === -1) return;
    const foodItems = order.items.filter(it => !it.isDiscount && !it.name.toLowerCase().includes('service'));
    const receiptFoodTotal = foodItems.reduce((s, it) => s + (parseFloat(it.unit_cost) || 0) * (parseInt(it.qty) || 1), 0);
    const myFoodTotal = foodItems.reduce((s, it) => {
      const idx = order.items.indexOf(it);
      return s + (myQtys[idx] || 0) * (parseFloat(it.unit_cost) || 0);
    }, 0);
    if (receiptFoodTotal <= 0) return;
    const proportion = myFoodTotal > 0 ? myFoodTotal / receiptFoodTotal : 0;
    const val = Math.round(proportion * 1000) / 1000;
    myQtys[scIdx] = val;
    const qtyEl = document.getElementById(`qty-${scIdx}`);
    if (qtyEl) {
      qtyEl.textContent = val;
      qtyEl.style.color = val > 0 ? '#1D9E75' : '';
    }
    const tag = document.getElementById(`split-tag-${scIdx}`);
    if (tag && val > 0) {
      tag.textContent = `${(proportion * 100).toFixed(1)}% pro-rated`;
    } else if (tag) {
      tag.textContent = 'Auto pro-rated';
    }
    renderSummary();
  }

  function changeQty(i, delta) {
    const remaining = getRemaining(order.items[i]);
    myQtys[i] = Math.min(remaining, Math.max(0, Math.round(((myQtys[i] || 0) + delta) * 1000) / 1000));
    document.getElementById(`qty-${i}`).textContent = myQtys[i];
    document.getElementById(`qty-${i}`).style.color = '';
    const tag = document.getElementById(`split-tag-${i}`);
    if (tag) tag.classList.add('hidden');
    // update + button disabled state
    const plusBtn = document.querySelector(`#item-row-${i} .qty-btn:last-of-type`);
    if (plusBtn) plusBtn.disabled = myQtys[i] >= remaining;
    // recalculate service charge if this is a food item
    const item = order.items[i];
    if (!item.isDiscount && !item.name.toLowerCase().includes('service')) {
      updateServiceChargeLive();
    }
    scheduleAutoSave();
  }

  function getRemaining(item) {
    const othersTotal = Object.entries(item.assignments || {})
      .filter(([n]) => n !== myName)
      .reduce((s, [, v]) => s + (parseFloat(v) || 0), 0);
    return Math.max(0, (parseFloat(item.qty) || 1) - othersTotal);
  }

  function getPrefill(item) {
    return parseFloat(item.assignments?.[myName] || 0);
  }

  // ── CLEAR ORDER ──────────────────────────────────────────────────────────
  function clearMyOrder() {
    if (!confirm('Clear all your selections?')) return;
    myQtys = order.items.map(() => 0);
    isDirty = true;
    renderItems();
    updateServiceChargeLive();
    renderSummary();
    scheduleAutoSave();
  }

  // ── AUTO-SAVE ────────────────────────────────────────────────────────────
  function scheduleAutoSave() {
    if (!myName) return;
    isDirty = true;
    clearTimeout(saveTimer);
    const st = document.getElementById('submitStatus');
    st.className = 'status';
    st.textContent = 'Saving...';
    saveTimer = setTimeout(() => autoSave(), 800);
  }

  async function autoSave() {
    const st = document.getElementById('submitStatus');
    isSaving = true;
    try {
      const res = await fetch(`${ORDERS_URL}/${orderId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: myName,
          assignments: myQtys.slice(0, order.items.length)
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      order = data;
      isDirty = false;
      st.className = 'status ok';
      st.textContent = '✓ Saved';
      renderParticipants();
    } catch (err) {
      st.className = 'status error';
      st.textContent = 'Error saving: ' + err.message;
    } finally {
      isSaving = false;
    }
  }

  // ── AUTO-REFRESH ────────────────────────────────────────────────────────
  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(refreshOrder, 12000);
  }

  async function refreshOrder() {
    if (isSaving) return;
    try {
      const res = await fetch(`${ORDERS_URL}/${orderId}`);
      if (!res.ok) return;
      const freshOrder = await res.json();
      // preserve myQtys if user has unsaved edits
      const savedMyQtys = [...myQtys];
      order = freshOrder;
      if (isDirty) {
        myQtys = savedMyQtys;
      }
      renderParticipants();
      renderItems();
      renderSummary();
      // restore myQtys after renderItems (which overwrites them from server)
      if (isDirty) {
        myQtys = savedMyQtys;
      }
    } catch (e) {
      // silent fail on polling
    }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      clearInterval(pollTimer);
      pollTimer = null;
    } else if (myName) {
      startPolling();
      refreshOrder();
    }
  });

  // ── SUMMARY ────────────────────────────────────────────────────────────────
  function getQty(item, i, n) {
    if (n === myName && !order.names.includes(myName)) return myQtys[i] || 0;
    return item.assignments?.[n] || 0;
  }

  function renderSummary() {
    const container = document.getElementById('summaryContent');
    if (!order) return;

    // include current user even if not yet saved
    const allNames = [...new Set([...( order.names || []), ...(myName ? [myName] : [])])];

    if (!allNames.length) {
      container.innerHTML = '<div class="empty-state">No orders submitted yet.</div>';
      return;
    }

    // separate food items from discount items
    const foodItems = order.items.filter(it => !it.isDiscount);
    const discItems = order.items.filter(it => it.isDiscount);

    // also add vat/scd/pwd from order fields if not already in items
    const vat = order.vat_adjustment || 0;
    const scd = order.sc_discount || 0;
    const pwd = order.pwd_discount || 0;

    let html = `<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="summary-table" style="min-width:320px">
      <thead><tr>
        <th style="width:40px;text-align:center">Qty</th>
        <th>Item</th>
        <th class="r">Total</th>
        <th class="r" style="color:#E67E22">Unassigned</th>
        ${allNames.map(n => `<th class="r">${n === myName ? `<span style="color:#1C4587">${n}</span>` : n}</th>`).join('')}
      </tr></thead>
      <tbody>`;

    // food rows
    foodItems.forEach((item, i) => {
      const idx = order.items.indexOf(item);
      const unitCost = parseFloat(item.unit_cost) || 0;
      const qty = parseInt(item.qty) || 1;
      const rowTotal = unitCost * qty;
      const totalAssigned = allNames.reduce((s, n) => s + getQty(item, idx, n), 0);
      const unassigned = Math.round((qty - totalAssigned) * 1000) / 1000;
      const unassignedAmt = unassigned * unitCost;
      html += `<tr>
        <td style="text-align:center;color:var(--muted);font-size:12px">${qty}</td>
        <td>${item.name}</td>
        <td class="r">₱${rowTotal.toFixed(2)}</td>
        <td class="r" style="color:${unassigned > 0 ? '#E67E22' : '#1D9E75'};font-weight:${unassigned > 0 ? '600' : '400'}">${unassigned > 0 ? '₱'+unassignedAmt.toFixed(2) : '✓'}</td>
        ${allNames.map(n => {
          const pQty = getQty(item, idx, n);
          const amt = pQty * unitCost;
          return `<td class="r" style="color:${pQty > 0 ? '#1a1a2e' : '#c0ccda'}">${pQty > 0 ? '₱'+amt.toFixed(2) : '—'}</td>`;
        }).join('')}
      </tr>`;
    });

    // subtotal row — sumproduct of qty × unit_cost
    const itemsSubtotal = foodItems.reduce((s, it) => s + (parseFloat(it.unit_cost)||0) * (parseInt(it.qty)||1), 0);
    const personTotals = allNames.map(n => {
      return foodItems.reduce((s, item) => {
        const idx = order.items.indexOf(item);
        return s + getQty(item, idx, n) * (parseFloat(item.unit_cost)||0);
      }, 0);
    });

    html += `</tbody><tfoot>
      <tr class="total-row" style="border-top:1px solid var(--border)">
        <td></td>
        <td>Subtotal</td>
        <td class="r">₱${itemsSubtotal.toFixed(2)}</td>
        <td></td>
        ${personTotals.map(t => `<td class="r">₱${t.toFixed(2)}</td>`).join('')}
      </tr>`;

    // discount items — treat exactly like food items
    const discountItems2 = order.items.filter(it => it.isDiscount);
    discountItems2.forEach((item) => {
      const idx = order.items.indexOf(item);
      const unitCost = parseFloat(item.unit_cost) || 0;
      const qty = parseInt(item.qty) || 1;
      const rowTotal = unitCost * qty;
      const totalAssigned = allNames.reduce((s, n) => s + getQty(item, idx, n), 0);
      const unassigned = Math.round((qty - totalAssigned) * 1000) / 1000;
      const unassignedAmt = unassigned * Math.abs(unitCost);
      html += `<tr>
        <td style="text-align:center;color:#8899b5;font-size:12px">${qty}</td>
        <td style="font-size:12px">${item.name}</td>
        <td class="r" style="font-size:12px">₱${rowTotal.toFixed(2)}</td>
        <td class="r" style="color:${unassigned > 0 ? '#E67E22' : '#1D9E75'};font-size:12px;font-weight:${unassigned > 0 ? '600' : '400'}">${unassigned > 0 ? '₱'+unassignedAmt.toFixed(2) : '✓'}</td>
        ${allNames.map(n => {
          const pQty = getQty(item, idx, n);
          const amt = pQty * unitCost;
          return `<td class="r" style="color:${pQty > 0 ? '#1a1a2e' : '#c0ccda'};font-size:12px">${pQty > 0 ? '₱'+amt.toFixed(2) : '—'}</td>`;
        }).join('')}
      </tr>`;
    });

    // total to pay — sum of food + discount items per person
    const grandTotal = order.items.reduce((s, it) => s + (parseFloat(it.unit_cost)||0) * (parseInt(it.qty)||1), 0);
    const personGrand = personTotals.map((t, i) => {
      const discShare = discountItems2.reduce((s, item) => {
        const idx = order.items.indexOf(item);
        const pQty = getQty(item, idx, allNames[i]);
        return s + pQty * (parseFloat(item.unit_cost)||0);
      }, 0);
      return t + discShare;
    });

    html += `<tr class="total-row">
      <td></td>
      <td>Total to pay</td>
      <td class="r">₱${grandTotal.toFixed(2)}</td>
      <td></td>
      ${personGrand.map(t => `<td class="r" style="color:#1D9E75">₱${t.toFixed(2)}</td>`).join('')}
    </tr>`;

    html += `</tfoot></table></div>`;

    // Unaccounted items
    const unaccounted = [];
    foodItems.forEach(item => {
      const totalAssigned = Object.values(item.assignments || {}).reduce((s, v) => s + (parseFloat(v)||0), 0);
      const remaining = Math.round(((parseInt(item.qty)||1) - totalAssigned) * 1000) / 1000;
      if (remaining > 0) unaccounted.push({ name: item.name, remaining, unit_cost: parseFloat(item.unit_cost)||0 });
    });

    if (unaccounted.length > 0) {
      html += `<div style="margin-top:1rem;padding:0.75rem 1rem;background:#fff8ee;border:1px solid #f0d090;border-radius:10px">
        <div style="font-size:11px;font-weight:700;color:#B45F06;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Not yet accounted for</div>
        ${unaccounted.map(it => `
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:0.5px solid #f0d090">
            <span style="color:#7a5a30">${it.name}</span>
            <span style="color:#B45F06;font-weight:600">${it.remaining} × ₱${it.unit_cost.toFixed(2)} = ₱${(it.remaining * it.unit_cost).toFixed(2)}</span>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#B45F06;padding-top:8px">
          <span>Total unaccounted</span>
          <span>₱${unaccounted.reduce((s,it) => s + it.remaining * it.unit_cost, 0).toFixed(2)}</span>
        </div>
      </div>`;
    } else {
      html += `<div style="margin-top:1rem;padding:0.75rem 1rem;background:#e6f7f0;border:1px solid #b8e0d0;border-radius:10px;font-size:13px;color:#1D9E75;font-weight:600;text-align:center">
        ✓ All items accounted for!
      </div>`;
    }

    container.innerHTML = html;
  }

  // ── DOWNLOAD XLSX ──────────────────────────────────────────────────────────
  async function shareLink() {
    const url = window.location.href;
    const st = document.getElementById('shareStatus');
    if (navigator.share) {
      try {
        await navigator.share({ title: 'tig-magkano — Split the bill', url });
      } catch (e) {
        if (e.name !== 'AbortError') { st.className = 'status error'; st.textContent = 'Share failed'; }
      }
    } else {
      await navigator.clipboard.writeText(url);
      st.className = 'status ok';
      st.textContent = '✓ Link copied!';
      setTimeout(() => { st.textContent = ''; }, 2000);
    }
  }

  function downloadXlsx() {
    const wb = XLSX.utils.book_new();
    const ws = {};
    const ALL_P = ['E','F','G','H','I','J','K','L','M','N','O','P','Q','R','S'];
    const names = order.names || [];

    function sc(addr, v, style) {
      ws[addr] = { v, t: typeof v === 'number' ? 'n' : 's', s: style };
    }

    const blueHdr  = { fill:{fgColor:{rgb:'1155CC'}}, font:{color:{rgb:'FFFFFF'},bold:true,name:'Arial',sz:11}, alignment:{horizontal:'center'} };
    const blueSub  = { fill:{fgColor:{rgb:'1C4587'}}, font:{color:{rgb:'FFFFFF'},bold:true,name:'Arial',sz:10}, alignment:{horizontal:'center'} };
    const amberHdr = { fill:{fgColor:{rgb:'B45F06'}}, font:{color:{rgb:'FFFFFF'},bold:true,name:'Arial',sz:10}, alignment:{horizontal:'center'} };
    const tanCell  = { fill:{fgColor:{rgb:'FFF2CC'}}, font:{name:'Arial',sz:10} };
    const subL     = { fill:{fgColor:{rgb:'C9DAF8'}}, font:{bold:true,name:'Arial',sz:10}, alignment:{horizontal:'center'} };
    const subR     = { fill:{fgColor:{rgb:'C9DAF8'}}, font:{bold:true,name:'Arial',sz:10}, alignment:{horizontal:'right'} };
    const grandC   = { fill:{fgColor:{rgb:'1C4587'}}, font:{color:{rgb:'FFFFFF'},bold:true,name:'Arial',sz:10}, alignment:{horizontal:'center'} };
    const grandR   = { fill:{fgColor:{rgb:'1C4587'}}, font:{color:{rgb:'FFFFFF'},bold:true,name:'Arial',sz:10}, alignment:{horizontal:'right'} };
    const normL    = { font:{name:'Arial',sz:10} };
    const normR    = { font:{name:'Arial',sz:10}, alignment:{horizontal:'right'} };
    const normC    = { font:{name:'Arial',sz:10}, alignment:{horizontal:'center'} };
    const orSt     = { fill:{fgColor:{rgb:'F5A623'}}, font:{color:{rgb:'5A3000'},name:'Arial',sz:10} };

    ws['!merges'] = [
      {s:{r:0,c:4}, e:{r:0,c:18}},
      {s:{r:22,c:0},e:{r:22,c:1}},
      {s:{r:23,c:0},e:{r:23,c:1}},
      {s:{r:26,c:0},e:{r:26,c:1}},
    ];

    ['A','B','C','D'].forEach(c => sc(c+'1','',blueSub));
    sc('E1','ORDER BREAKDOWN',blueHdr);
    for (let c=5;c<=18;c++) { const a=XLSX.utils.encode_cell({r:0,c}); if(!ws[a]) sc(a,'',blueHdr); }
    sc('T1','',blueSub); sc('U1','',amberHdr);

    ['A','B','C','D'].forEach(c => sc(c+'2', c==='A'?'Qty':c==='B'?'Item Name':c==='C'?'Unit Cost':'', blueSub));
    names.forEach((n,i) => { if (i < 6) sc(ALL_P[i]+'2', n, blueSub); });
    for (let c=names.length;c<15;c++) sc(ALL_P[c]+'2','',blueSub);
    sc('T2','',blueSub); sc('U2','NOTES',amberHdr);

    const DS=3, DE=22;
    order.items.forEach((it, i) => {
      const r = DS+i;
      sc(`A${r}`, parseInt(it.qty)||1, normC);
      sc(`B${r}`, it.name||'', normL);
      sc(`C${r}`, parseFloat(it.unit_cost)||0, normR);
      sc(`D${r}`, '', normL);
      names.forEach((n, ni) => {
        if (ni < 15) {
          const qty = it.assignments?.[n] || 0;
          sc(ALL_P[ni]+r, qty || '', qty ? normC : tanCell);
        }
      });
      for (let c=names.length;c<15;c++) sc(ALL_P[c]+r,'',tanCell);
      sc(`T${r}`,'',normL);
      ws[`U${r}`] = { f:`IF(SUM($E${r}:$S${r})<>$A${r}," Not all orders for this item have been accounted for.","")`, t:'s', v:'' };
    });
    for (let r=DS+order.items.length; r<=DE; r++) {
      ['A','B','C','D'].forEach(c => sc(`${c}${r}`,'',normL));
      ALL_P.forEach(c => sc(`${c}${r}`,'',tanCell));
      sc(`T${r}`,'',normL);
      ws[`U${r}`] = { f:`IF(SUM($E${r}:$S${r})<>$A${r}," Not all orders for this item have been accounted for.","")`, t:'s', v:'' };
    }

    const SR=23;
    sc(`A${SR}`,'SUBTOTAL',subL); sc(`B${SR}`,'',subL);
    ws[`C${SR}`] = { f:`SUMPRODUCT($A$${DS}:$A$${DE},$C$${DS}:$C$${DE})`, t:'n', v:0, s:subR };
    sc(`D${SR}`,'',subL);
    ALL_P.forEach(c => { ws[`${c}${SR}`]={ f:`SUMPRODUCT(${c}$${DS}:${c}$${DE},$C$${DS}:$C$${DE})`, t:'n', v:0, s:subR }; });
    sc(`T${SR}`,'',normL);
    ws[`U${SR}`] = { f:`IF(SUM($E${SR}:$S${SR})<>$C${SR}," Amount unaccounted for: "&TEXT((C${SR}-SUM(E${SR}:S${SR})),"#,##0.00"),"")`, t:'s', v:'', s:orSt };

    const LR=24;
    sc(`A${LR}`,'    Less: Discounts',normL);
    for (let c=1;c<=20;c++) sc(XLSX.utils.encode_cell({r:LR-1,c}),'',normL);

    const vat = order.vat_adjustment, scd = order.sc_discount;
    const VR=25;
    sc(`A${VR}`,'',normL); sc(`B${VR}`,'VAT Adjustment',normL);
    if (vat != null) sc(`C${VR}`,vat,normR); else sc(`C${VR}`,'',normL);
    ALL_P.forEach(c => sc(`${c}${VR}`, vat!=null?0:'', normR));
    sc(`D${VR}`,'',normL); sc(`T${VR}`,'',normL); sc(`U${VR}`,'',normL);

    const SCR=26;
    sc(`A${SCR}`,'',normL); sc(`B${SCR}`,'SC Discount',normL);
    if (scd != null) sc(`C${SCR}`,scd,normR); else sc(`C${SCR}`,'',normL);
    ALL_P.forEach(c => sc(`${c}${SCR}`, scd!=null?0:'', normR));
    sc(`D${SCR}`,'',normL); sc(`T${SCR}`,'',normL); sc(`U${SCR}`,'',normL);

    const GR=27;
    sc(`A${GR}`,'GRAND TOTAL',grandC); sc(`B${GR}`,'',grandC);
    ws[`C${GR}`] = { f:`SUM(C${SR}:C${SCR})`, t:'n', v:0, s:grandR };
    sc(`D${GR}`,'',grandC);
    ALL_P.forEach(c => { ws[`${c}${GR}`]={ f:`SUM(${c}$${SR}:${c}$${SCR})`, t:'n', v:0, s:grandR }; });
    sc(`T${GR}`,'',grandC); sc(`U${GR}`,'',grandC);

    ws['!ref'] = `A1:U${GR}`;
    ws['!cols'] = [
      {wch:3.6},{wch:17},{wch:9.7},{wch:2.1},
      {wch:7.6},{wch:13},{wch:13},{wch:13},{wch:13},{wch:13},
      {wch:13},{wch:13},{wch:13},{wch:13},{wch:13},
      {wch:13},{wch:13},{wch:13},{wch:13},{wch:5},{wch:36}
    ];
    ws['!rows'] = [];
    ws['!rows'][SR-1] = {hpt:20.25};
    ws['!rows'][GR-1] = {hpt:20.25};

    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
    const now = new Date();
    const fname = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}.xlsx`;
    XLSX.writeFile(wb, fname);
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js');
    });
  }
</script>
</body>
</html>
